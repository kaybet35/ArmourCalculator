<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Armour Calculator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="card">

    <div class="top-controls">
        <button id="alliance-toggle">Ancient</button>
    </div>

    <h2>Armour Calculator</h2>

    <div class="main-content">

        <!-- ── LEFT COLUMN: Slot selectors ─────────────────── -->
        <div class="controls-column">

            <!-- Saved Loadouts -->
            <div class="loadout-section">
                <label>Saved Loadouts</label>
                <div class="loadout-controls">
                    <input
                        type="text"
                        id="loadout-name"
                        class="loadout-input"
                        placeholder="Loadout Name..."
                    >
                    <button id="save-loadout" class="btn btn-save">Save</button>
                </div>
                <div id="loadout-list" class="loadout-list"></div>
            </div>

            <!-- Chest Clothing -->
            <div class="slot" data-slot-id="chest-clothing">
                <label>Chest Clothing</label>
                <div class="icon-row armor-icons">
                    <div class="icon-item active" data-value="none" data-mit="0" data-stab="0">
                        <span class="none-icon">∅</span>
                    </div>
                    <div class="icon-item" data-value="common_garment" data-mit="4" data-stab="2">
                        <img src="IconClothingBody001_A_M.png" title="Common Garment">
                    </div>
                </div>
                <div class="tier-row tier-icons">
                    <div class="tier-item active" data-tier="1"><span class="tier-0-text">0</span></div>
                    <div class="tier-item" data-tier="1.1"><img src="ItemQualityLow.png"    title="Tier 1"></div>
                    <div class="tier-item" data-tier="1.2"><img src="ItemQualityMedium.png" title="Tier 2"></div>
                    <div class="tier-item" data-tier="1.3"><img src="ItemQualityHigh.png"   title="Tier 3"></div>
                </div>
            </div>

            <!-- Leg Clothing -->
            <div class="slot" data-slot-id="leg-clothing">
                <label>Leg Clothing</label>
                <div class="icon-row armor-icons">
                    <div class="icon-item active" data-value="none" data-mit="0" data-stab="0">
                        <span class="none-icon">∅</span>
                    </div>
                    <div class="icon-item" data-value="common_bottoms" data-mit="2" data-stab="1">
                        <img src="IconClothingLeg001_A_M.png" title="Common Bottoms">
                    </div>
                </div>
                <div class="tier-row tier-icons">
                    <div class="tier-item active" data-tier="1"><span class="tier-0-text">0</span></div>
                    <div class="tier-item" data-tier="1.1"><img src="ItemQualityLow.png"    title="Tier 1"></div>
                    <div class="tier-item" data-tier="1.2"><img src="ItemQualityMedium.png" title="Tier 2"></div>
                    <div class="tier-item" data-tier="1.3"><img src="ItemQualityHigh.png"   title="Tier 3"></div>
                </div>
            </div>

            <!-- Helmet -->
            <div class="slot" data-slot-id="helmet">
                <label>Helmet</label>
                <div class="icon-row armor-icons">
                    <div class="icon-item active" data-value="none" data-mit="0" data-stab="0">
                        <span class="none-icon">∅</span>
                    </div>
                    <div class="icon-item" data-value="auxiliary_helmet" data-mit="4" data-stab="0">
                        <img src="IconAuxArmourHead001_A.png" title="Auxiliary">
                    </div>
                    <div class="icon-item" data-value="light_helmet" data-mit="6" data-stab="3">
                        <img src="IconLightArmourHead001_A.png" title="Light">
                    </div>
                    <div class="icon-item" data-value="reinforced_helmet" data-mit="13" data-stab="9">
                        <img src="IconMediumArmourHead001_A.png" title="Reinforced">
                    </div>
                    <div class="icon-item" data-value="heavy_helmet" data-mit="16" data-stab="11">
                        <img src="IconHeavyArmourHead001_A.png" title="Heavy">
                    </div>
                </div>
                <div class="tier-row tier-icons">
                    <div class="tier-item active" data-tier="1"><span class="tier-0-text">0</span></div>
                    <div class="tier-item" data-tier="1.1"><img src="ItemQualityLow.png"    title="Tier 1"></div>
                    <div class="tier-item" data-tier="1.2"><img src="ItemQualityMedium.png" title="Tier 2"></div>
                    <div class="tier-item" data-tier="1.3"><img src="ItemQualityHigh.png"   title="Tier 3"></div>
                </div>
            </div>

            <!-- Chest Armour -->
            <div class="slot" data-slot-id="chest-armor">
                <label>Chest Armour</label>
                <div class="icon-row armor-icons">
                    <div class="icon-item active" data-value="none" data-mit="0" data-stab="0">
                        <span class="none-icon">∅</span>
                    </div>
                    <div class="icon-item" data-value="auxiliary_chest" data-mit="11" data-stab="0">
                        <img src="IconAuxArmourBody001_A.png" title="Auxiliary">
                    </div>
                    <div class="icon-item" data-value="light_chest" data-mit="24" data-stab="12">
                        <img src="IconLightArmourBody001_A.png" title="Light">
                    </div>
                    <div class="icon-item" data-value="reinforced_chest" data-mit="58" data-stab="32">
                        <img src="IconMediumArmourBody001_A.png" title="Reinforced">
                    </div>
                    <div class="icon-item" data-value="heavy_chest" data-mit="64" data-stab="35">
                        <img src="IconHeavyArmourBody001_A.png" title="Heavy">
                    </div>
                </div>
                <div class="tier-row tier-icons">
                    <div class="tier-item active" data-tier="1"><span class="tier-0-text">0</span></div>
                    <div class="tier-item" data-tier="1.1"><img src="ItemQualityLow.png"    title="Tier 1"></div>
                    <div class="tier-item" data-tier="1.2"><img src="ItemQualityMedium.png" title="Tier 2"></div>
                    <div class="tier-item" data-tier="1.3"><img src="ItemQualityHigh.png"   title="Tier 3"></div>
                </div>
            </div>

            <!-- Leg Armour -->
            <div class="slot" data-slot-id="leg-armor">
                <label>Leg Armour</label>
                <div class="icon-row armor-icons">
                    <div class="icon-item active" data-value="none" data-mit="0" data-stab="0">
                        <span class="none-icon">∅</span>
                    </div>
                    <div class="icon-item" data-value="auxiliary_leg" data-mit="1" data-stab="0">
                        <img src="IconAuxArmourLeg001_A.png" title="Auxiliary">
                    </div>
                    <div class="icon-item" data-value="light_leg" data-mit="4" data-stab="2">
                        <img src="IconLightArmourLeg001_A.png" title="Light">
                    </div>
                    <div class="icon-item" data-value="reinforced_leg" data-mit="8" data-stab="7">
                        <img src="IconMediumArmourLeg001_A.png" title="Reinforced">
                    </div>
                    <div class="icon-item" data-value="heavy_leg" data-mit="10" data-stab="8">
                        <img src="IconHeavyArmourLeg001_A.png" title="Heavy">
                    </div>
                </div>
                <div class="tier-row tier-icons">
                    <div class="tier-item active" data-tier="1"><span class="tier-0-text">0</span></div>
                    <div class="tier-item" data-tier="1.1"><img src="ItemQualityLow.png"    title="Tier 1"></div>
                    <div class="tier-item" data-tier="1.2"><img src="ItemQualityMedium.png" title="Tier 2"></div>
                    <div class="tier-item" data-tier="1.3"><img src="ItemQualityHigh.png"   title="Tier 3"></div>
                </div>
            </div>

        </div><!-- /controls-column -->

        <!-- ── RIGHT COLUMN: Results & costs ───────────────── -->
        <div class="results-column">

            <!-- Stats grid -->
            <div class="result-container">
                <div class="result-item">
                    <label>Damage Mitigation</label>
                    <div>
                        <span id="total-armour-mitigation">0%</span>
                        <span id="delta-mitigation" class="delta"></span>
                    </div>
                </div>
                <div class="result-item">
                    <label>Effective Health</label>
                    <div>
                        <span id="effective-health">100</span>
                        <span id="delta-ehp" class="delta"></span>
                    </div>
                </div>
                <div class="result-item">
                    <label>Stability Mitigation</label>
                    <div>
                        <span id="total-stability-mitigation">0%</span>
                        <span id="delta-stability" class="delta"></span>
                    </div>
                </div>
                <div class="result-item">
                    <label>Effective Stability</label>
                    <div>
                        <span id="effective-stability">100</span>
                        <span id="delta-est" class="delta"></span>
                    </div>
                </div>
            </div>

            <!-- Crafting cost breakdown -->
            <div class="cost-section">
                <label>Total Crafting Cost</label>
                <ul id="material-list" class="cost-list"></ul>
            </div>

        </div><!-- /results-column -->

    </div><!-- /main-content -->

</div><!-- /card -->

<script src="script.js"></script>
</body>
</html>
